# =====================================================================
# Render Blueprint para SIGA Backend (Docker + Neon Postgres).
# Crea el servicio con: Render Dashboard -> New -> Blueprint (apunta a este repo).
#
# IMPORTANTE: las variables con `sync: false` NO se guardan en el repo;
# Render las pide en el dashboard. Así las credenciales de Neon nunca
# quedan versionadas ni expuestas.
# =====================================================================
services:
  - type: web
    name: siga-backend
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/public/health
    envVars:
      # ÚNICO secreto requerido: la contraseña de Neon. Cárgala en el dashboard de Render.
      - key: SIGA_DB_PASSWORD
        sync: false
      # Opcionales de BD (ya tienen valor por defecto en application.properties):
      #   SIGA_DB_URL  -> URL de Neon
      #   SIGA_DB_USER -> neondb_owner
      # --- Frontend Vercel + CORS con credenciales ---
      - key: SIGA_CORS_ORIGINS
        value: https://siga-fronted.vercel.app,http://localhost:5173,http://localhost:3000
      # --- Login con Google: perfil + credenciales por variables de entorno ---
      - key: SPRING_PROFILES_ACTIVE
        value: google
      - key: GOOGLE_CLIENT_ID
        value: 994222033064-uqblt3m8cdj9j8paert3v20gamaergjm.apps.googleusercontent.com
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SIGA_FRONTEND_REDIRECT_URI
        value: https://siga-fronted.vercel.app/inicio
