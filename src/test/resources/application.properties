# ===================== Configuración SOLO para tests =====================
# Base de datos H2 en memoria (modo PostgreSQL) para no depender de un PostgreSQL real.
spring.datasource.url=jdbc:h2:mem:sigatest;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# En tests, Hibernate genera el esquema a partir de las entidades y Flyway queda deshabilitado.
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.flyway.enabled=false

# Sin registración OAuth2 en tests: el login con Google no se monta (la app igual carga el contexto).
app.cors.allowed-origins=http://localhost:5173
app.frontend.redirect-uri=http://localhost:5173
app.auth.employee-register-code=SIGA-FUNC-2026
