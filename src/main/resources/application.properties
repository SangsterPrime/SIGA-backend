spring.application.name=siga-backend

server.port=${PORT:8080}
server.forward-headers-strategy=framework

spring.datasource.url=${SIGA_DB_URL}
spring.datasource.username=${SIGA_DB_USER}
spring.datasource.password=${SIGA_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.max-lifetime=1800000

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

server.servlet.session.cookie.same-site=none
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true

app.cors.allowed-origins=${SIGA_CORS_ORIGINS:http://localhost:5173}
app.frontend.redirect-uri=${SIGA_FRONTEND_REDIRECT_URI:http://localhost:5173/inicio}

app.auth.employee-register-code=${EMPLOYEE_REGISTER_CODE}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized
