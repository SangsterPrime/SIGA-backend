spring.application.name=siga-backend

# Puerto HTTP: usa el que inyecta la plataforma (Render define PORT); en local = 8080.
server.port=${PORT:8080}

# ===================== Datasource (PostgreSQL / Neon) =====================
# La URL y el usuario tienen valor por defecto (datos de conexión de Neon, NO secretos),
# para que la app conecte aunque no se definan esas variables en el hosting.
# La CONTRASEÑA es el único secreto y SIEMPRE va por variable de entorno (sin default):
#   - En Render: definir SIGA_DB_PASSWORD en Environment.
#   - En local : ponerla en application-local.properties (gitignored) o como $env:SIGA_DB_PASSWORD.
spring.datasource.url=${SIGA_DB_URL:jdbc:postgresql://ep-proud-credit-atxikxie-pooler.c-9.us-east-1.aws.neon.tech/neondb?sslmode=require}
spring.datasource.username=${SIGA_DB_USER:neondb_owner}
spring.datasource.password=${SIGA_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ----- Hikari (pool pequeño, recomendado para Postgres serverless como Neon) -----
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.max-lifetime=30000

# ===================== JPA / Hibernate =====================
# Flyway administra el esquema (fuente de verdad); Hibernate solo VALIDA (nunca update/create).
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# ===================== Flyway =====================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ===================== OAuth2 Login (Google) =====================
# La registración de Google vive en el perfil "google" (application-google.properties),
# de modo que la app arranca aunque no haya credenciales. Para habilitarlo:
#   .\mvnw.cmd spring-boot:run -Dspring-boot.run.profiles=google

# ===================== App (CORS y frontend) =====================
# Requeridas por CorsConfig (CORS para React local) y OAuth2LoginSuccessHandler.
app.cors.allowed-origins=${SIGA_CORS_ORIGINS:http://localhost:5173,http://localhost:3000}
app.frontend.redirect-uri=${SIGA_FRONTEND_REDIRECT_URI:http://localhost:5173}

# ===================== Actuator =====================
management.endpoints.web.exposure.include=health,info
