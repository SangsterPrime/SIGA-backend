# ===================== Perfil "google" — Login con Google (OAuth2 / OIDC) =====================
# Se activa con: ./mvnw spring-boot:run -Dspring-boot.run.profiles=google
# Requiere las variables de entorno GOOGLE_CLIENT_ID y GOOGLE_CLIENT_SECRET.
# URI de redirección a registrar en Google Cloud Console:
#   http://localhost:8080/login/oauth2/code/google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,email,profile
